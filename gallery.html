<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Helvetica Neue", Arial, sans-serif;
}

body{
background:#ffffff;
color:#000;
padding:60px 20px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
font-size:36px;
letter-spacing:2px;
margin-bottom:50px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border:1px solid #000;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

.btn{
display:inline-block;
margin-top:40px;
text-decoration:none;
color:#000;
border:1px solid #000;
padding:10px 24px;
font-size:14px;
letter-spacing:1px;
transition:0.3s;
}

.btn:hover{
background:#000;
color:#fff;
}

.center{
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>GALLERY</h1>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">

</div>

<div class="center">
<a href="index.html" class="btn">BACK</a>
</div>

</div>

</body>
</html>
