<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimalist Website</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#ffffff;
color:#111;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
text-align:center;
}

h1{
font-size:40px;
font-weight:600;
margin-bottom:40px;
letter-spacing:2px;
}

.nav{
display:flex;
gap:20px;
justify-content:center;
}

.btn{
text-decoration:none;
color:#111;
border:1px solid #111;
padding:12px 28px;
font-size:14px;
letter-spacing:1px;
transition:0.3s;
}

.btn:hover{
background:#111;
color:#fff;
}
</style>

</head>
<body>

<div class="container">

<h1>My Website</h1>

<div class="nav">
<a href="profile.html" class="btn">PROFILE</a>
<a href="gallery.html" class="btn">GALLERY</a>
<a href="hobby.html" class="btn">HOBBIES</a>
</div>

</div>

</body>
</html>
